<div class="flex flex-col items-center justify-center min-h-screen gap-6 text-center bg-slate-50">

  @if (status() === 'loading') {
    <div class="w-14 h-14 rounded-full border-4 border-slate-200 border-t-teal-500 animate-spin"></div>
    <p class="text-slate-500 text-sm">Accepting your invitation...</p>
  }

  @if (status() === 'error') {
    <div class="w-14 h-14 rounded-full bg-red-50 flex items-center justify-center">
      <svg class="w-7 h-7 text-red-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <line x1="15" y1="9" x2="9" y2="15"/>
        <line x1="9" y1="9" x2="15" y2="15"/>
      </svg>
    </div>
    <div>
      <h2 class="text-xl font-bold text-slate-800">Invitation invalid or expired</h2>
      <p class="text-slate-500 text-sm mt-1">This invitation link has expired or already been used.</p>
    </div>
    <a href="/auth/login" class="text-teal-700 font-semibold text-sm hover:text-teal-600 transition-colors">
      Go to login
    </a>
  }

</div>
