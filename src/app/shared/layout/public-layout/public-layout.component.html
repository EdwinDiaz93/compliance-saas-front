<div class="min-h-screen flex flex-col bg-slate-50">

    <!-- Header -->
    <header class="w-full border-b border-slate-200 bg-white/80 backdrop-blur-sm sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
            <a routerLink="/pricing" class="flex items-center gap-2.5">
                <div class="w-8 h-8 rounded-lg linear-ic flex items-center justify-center">
                    <svg class="w-4 h-4 text-white" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/>
                    </svg>
                </div>
                <span class="text-lg font-bold text-slate-800 tracking-tight">ComplyyCert</span>
            </a>
            <div class="flex items-center gap-3">
                <a routerLink="/pricing" class="text-sm text-slate-500 hover:text-slate-800 transition-colors font-medium">Pricing</a>
                @if (isAuthenticated) {
                    <a routerLink="/dashboard" class="text-sm font-semibold text-white linear-ic px-4 py-2 rounded-lg transition-opacity hover:opacity-90">Dashboard</a>
                } @else {
                    <a routerLink="/auth/login" class="text-sm text-slate-600 hover:text-slate-900 font-medium transition-colors px-4 py-2 rounded-lg hover:bg-slate-100">Sign in</a>
                    <a routerLink="/auth/register" class="text-sm font-semibold text-white linear-ic px-4 py-2 rounded-lg transition-opacity hover:opacity-90">Get started</a>
                }
            </div>
        </div>
    </header>

    <!-- Page content -->
    <main class="flex-1">
        <router-outlet></router-outlet>
    </main>

    <!-- Footer -->
    <footer class="border-t border-slate-200 bg-white">
        <div class="max-w-6xl mx-auto px-6 py-8 flex flex-col sm:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-2">
                <div class="w-6 h-6 rounded linear-ic flex items-center justify-center">
                    <svg class="w-3 h-3 text-white" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/>
                    </svg>
                </div>
                <span class="text-sm text-slate-500">© {{ year }} ComplyyCert. All rights reserved.</span>
            </div>
            <div class="flex items-center gap-6">
                <a routerLink="/pricing" class="text-sm text-slate-500 hover:text-slate-700 transition-colors">Pricing</a>
                <a routerLink="/terms" class="text-sm text-slate-500 hover:text-slate-700 transition-colors">Terms of Service</a>
                <a routerLink="/privacy" class="text-sm text-slate-500 hover:text-slate-700 transition-colors">Privacy Policy</a>
                <a routerLink="/refund" class="text-sm text-slate-500 hover:text-slate-700 transition-colors">Refund Policy</a>
            </div>
        </div>
    </footer>

</div>
